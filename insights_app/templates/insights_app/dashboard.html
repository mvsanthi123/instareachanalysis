{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Insights Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#6366f1;
  --accent:#ec4899;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#fdf2f8,#dbeafe,#f0f9ff);
  min-height:100vh;
}

/* ================= HEADER ================= */
.app-header{
  display:flex;
  justify-content:center;
  padding:30px 20px 10px;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:18px;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(12px);
  padding:18px 30px;
  border-radius:25px;
  box-shadow:0 20px 45px rgba(0,0,0,.15);
}

.logo-circle{
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#ec4899);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:white;
  animation:glowPulse 3s infinite;
}

.logo-box h1{
  font-size:1.6rem;
  color:#111827;
}
.logo-box p{
  font-size:.95rem;
  color:#6b7280;
}

@keyframes glowPulse{
  0%{box-shadow:0 0 0 rgba(99,102,241,.4)}
  50%{box-shadow:0 0 35px rgba(99,102,241,.6)}
  100%{box-shadow:0 0 0 rgba(99,102,241,.4)}
}

/* ================= TABS ================= */
.tabs{
  position:sticky;
  top:0;
  z-index:20;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  padding:18px 25px;
  justify-content:center;
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(14px);
  box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.tab-btn{
  padding:12px 20px;
  border-radius:40px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:.95rem;
  background:white;
  color:#374151;
  transition:all .35s ease;
  box-shadow:0 6px 15px rgba(0,0,0,.1);
}

.tab-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 14px 35px rgba(99,102,241,.35);
}

.tab-btn.active{
  background:linear-gradient(135deg,#6366f1,#ec4899);
  color:white;
  box-shadow:0 18px 45px rgba(236,72,153,.55);
}

/* ================= SECTIONS ================= */
.section{
  display:none;
  padding:30px;
  animation:fadeSlide .6s ease;
}
.section.active{display:block}

@keyframes fadeSlide{
  from{opacity:0;transform:translateY(25px)}
  to{opacity:1;transform:translateY(0)}
}

/* ================= GRID & CARDS ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(420px,1fr)); /* 🔥 wider cards */
  gap:30px; /* 🔥 more spacing */
}

/* 🔥 CARD IMPROVED FOR VISIBILITY */
.card{
  background:white; /* remove heavy transparency */
  border-radius:18px;
  padding:20px;
  text-align:center;
  box-shadow:0 15px 30px rgba(0,0,0,.12);
  transition:.4s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 50px rgba(99,102,241,.25);
}

/* 🔥 BIGGER + CLEAR GRAPH */
.card img{
  width:100%;
  height:420px;                 /* 🔥 BIG INCREASE */
  object-fit:contain;
  border-radius:12px;
  background:white;
  padding:10px;                  /* 🔥 space for axis labels */
  image-rendering:crisp-edges;   /* 🔥 sharper text */
}

/* 🔥 Optional zoom on hover */
.card img:hover{
  transform:scale(1.02);
}

/* ================= METRICS ================= */
.metrics-box{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  max-width:600px;
  margin:auto;
  font-size:18px;
  line-height:1.8;
}

/* ================= AUTO INSIGHTS ================= */
.insight-box {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  border-radius: 16px;
  padding: 20px;
  color: #fff;
  box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
}

.insight-scroll {
  height: 240px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}

.insight-scroll ul {
  list-style: none;
  padding: 0;
  margin: 0;
  animation: scrollInsights 45s linear infinite;
}

.insight-scroll li {
  padding: 14px 0;
  font-size: 16px;
  line-height: 1.7;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }

  .card img{
    height:300px; /* mobile optimized */
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="app-header">
  <div class="logo-box">
    <div class="logo-circle">📊</div>
    <div>
      <h1>Instagram Insights Dashboard</h1>
      <p>AI-Powered Social Media Analytics & Prediction</p>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('overview',this)">🏠 Overview</button>
  <button class="tab-btn" onclick="showTab('wordclouds',this)">☁️ Wordclouds</button>
  <button class="tab-btn" onclick="showTab('interactions',this)">❤️ Interactions</button>
  <button class="tab-btn" onclick="showTab('trends',this)">📈 Trends</button>
  <button class="tab-btn" onclick="showTab('more',this)">📊 More Analytics</button>
  <button class="tab-btn" onclick="showTab('metrics',this)">🧠 Metrics</button>
  <button class="tab-btn" onclick="showTab('model_features',this)">🤖 Model & Features</button>
  <button class="tab-btn" onclick="showTab('best_time',this)">⏰ Best Time</button>
  <button class="tab-btn" onclick="showTab('hashtag_caption',this)">#️⃣ Hashtag & Caption</button>
  <button class="tab-btn" onclick="showTab('media_type',this)">🎥 Media Type</button>
  <button class="tab-btn" onclick="showTab('auto_insights',this)">💡 Insights</button>
</div>

<!-- KEEP ALL YOUR SECTIONS EXACTLY SAME BELOW -->
<!-- (No change in Django logic or structure) -->

<!-- your entire original sections remain unchanged -->

<script>
function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
</script>

<script>
const insightScroll = document.getElementById("insightScroll");
const insightList = insightScroll.querySelector("ul");

let resumeTimeout = null;

insightScroll.addEventListener("click", () => {
  insightList.style.animationPlayState = "paused";
  clearTimeout(resumeTimeout);
  resumeTimeout = setTimeout(() => {
    insightList.style.animationPlayState = "running";
  }, 3000);
});
</script>

</body>
</html>
